    # Product2 (flex product) schemas
    Product2Base:
      type: object
      required: [title, description, category, productType]
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        subCategory:
          type: string
        brand:
          type: string
        productType:
          type: string
          enum: [simple, sizes_only, variant, variant_with_sizes]
        isActive:
          type: boolean
        images:
          type: array
          items:
            type: string
        imageCover:
          type: string
        basePrice:
          type: number
        priceAfterDiscount:
          type: number

    Product2Simple:
      allOf:
        - $ref: "#/components/schemas/Product2Base"
        - type: object
          required: [price, stock]
          properties:
            productType:
              type: string
              enum: [simple]
            price:
              type: number
            stock:
              type: number

    Product2Size:
      type: object
      required: [name, price, stock]
      properties:
        name:
          type: string
        price:
          type: number
        stock:
          type: number

    Product2SizesOnly:
      allOf:
        - $ref: "#/components/schemas/Product2Base"
        - type: object
          required: [sizes]
          properties:
            productType:
              type: string
              enum: [sizes_only]
            sizes:
              type: array
              items:
                $ref: "#/components/schemas/Product2Size"

    Product2Variant:
      type: object
      required: [color]
      properties:
        color:
          type: string
        images:
          type: array
          items:
            type: string
        price:
          type: number
        stock:
          type: number

    Product2VariantWithSizes:
      type: object
      required: [color, sizes]
      properties:
        color:
          type: string
        images:
          type: array
          items:
            type: string
        sizes:
          type: array
          items:
            $ref: "#/components/schemas/Product2Size"

    Product2Colors:
      allOf:
        - $ref: "#/components/schemas/Product2Base"
        - type: object
          required: [variants]
          properties:
            productType:
              type: string
              enum: [variant]
            variants:
              type: array
              items:
                $ref: "#/components/schemas/Product2Variant"

    Product2ColorsWithSizes:
      allOf:
        - $ref: "#/components/schemas/Product2Base"
        - type: object
          required: [variants]
          properties:
            productType:
              type: string
              enum: [variant_with_sizes]
            variants:
              type: array
              items:
                $ref: "#/components/schemas/Product2VariantWithSizes"

    Product2Create:
      oneOf:
        - $ref: "#/components/schemas/Product2Simple"
        - $ref: "#/components/schemas/Product2SizesOnly"
        - $ref: "#/components/schemas/Product2Colors"
        - $ref: "#/components/schemas/Product2ColorsWithSizes"

    Product2Update:
      allOf:
        - $ref: "#/components/schemas/Product2Base"
        - type: object
          properties:
            price:
              type: number
            stock:
              type: number
            sizes:
              type: array
              items:
                $ref: "#/components/schemas/Product2Size"
            variants:
              type: array
              items:
                oneOf:
                  - $ref: "#/components/schemas/Product2Variant"
                  - $ref: "#/components/schemas/Product2VariantWithSizes"

    Product2SizeCreate:
      $ref: "#/components/schemas/Product2Size"

    Product2SizeUpdate:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        stock:
          type: number

    Product2VariantCreate:
      $ref: "#/components/schemas/Product2Variant"

    Product2VariantUpdate:
      type: object
      properties:
        color:
          type: string
        images:
          type: array
          items:
            type: string
        price:
          type: number
        stock:
          type: number
        sizes:
          type: array
          items:
            $ref: "#/components/schemas/Product2Size"

    Product2VariantSizeCreate:
      $ref: "#/components/schemas/Product2Size"

    Product2VariantSizeUpdate:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        stock:
          type: number
