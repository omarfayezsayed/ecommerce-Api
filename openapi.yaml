openapi: 3.0.3
info:
  title: ecommerceAPI
  version: 1.0.0
  description: >-
    RESTful backend for an e-commerce platform. Includes products, categories,
    subcategories, brands, users, reviews, coupons, wishlist and address
    management. Authentication uses JWT; some endpoints accept multipart file
    uploads.
servers:
  - url: http://localhost:{port}
    description: Local development server
    variables:
      port:
        default: "4000"

  - url: https://api.yourdomain.com
    description: Production server

paths:
  /api/v1/docs:
    get:
      tags: [Docs]
      summary: Serve API documentation
      responses:
        "200":
          description: Swagger UI / OpenAPI spec

  /api/v1/categories:
    get:
      tags: [Categories]
      summary: List categories
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/search"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCategories"
    post:
      tags: [Categories]
      summary: Create category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CategoryCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /api/v1/categories/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Categories]
      summary: Get category by id
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    patch:
      tags: [Categories]
      summary: Update category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      tags: [Categories]
      summary: Delete category
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted

  /api/v1/subCategories:
    get:
      tags: [SubCategories]
      summary: List subcategories
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/search"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubCategory"
    post:
      tags: [SubCategories]
      summary: Create subcategory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/SubCategoryCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubCategory"

  /api/v1/subCategories/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [SubCategories]
      summary: Get subcategory
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubCategory"
    patch:
      tags: [SubCategories]
      summary: Update subcategory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/SubCategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubCategory"
    delete:
      tags: [SubCategories]
      summary: Delete subcategory
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted

  /api/v1/brands:
    get:
      tags: [Brands]
      summary: List brands
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Brand"
    post:
      tags: [Brands]
      summary: Create brand
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/BrandCreate"
      responses:
        "201":
          description: Created

  /api/v1/brands/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Brands]
      summary: Get brand
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
    patch:
      tags: [Brands]
      summary: Update brand
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/BrandUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
    delete:
      tags: [Brands]
      summary: Delete brand
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted

  /api/v1/products:
    get:
      tags: [Products]
      summary: List products
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/sort"
        - $ref: "#/components/parameters/fields"
        - in: query
          name: category
          schema:
            type: string
          description: Filter by category id
        - in: query
          name: brand
          schema:
            type: string
          description: Filter by brand id
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProducts"
    post:
      tags: [Products]
      summary: Create product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ProductCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /api/v1/products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Products]
      summary: Get product
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      tags: [Products]
      summary: Update product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      tags: [Products]
      summary: Delete product
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted

  /api/v1/products/{productId}/reviews:
    parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Reviews]
      summary: List reviews for a product
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      tags: [Reviews]
      summary: Create a review for a product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /api/v1/reviews:
    get:
      tags: [Reviews]
      summary: List reviews
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      tags: [Reviews]
      summary: Create review
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /api/v1/reviews/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Reviews]
      summary: Get review
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
    patch:
      tags: [Reviews]
      summary: Update review (owner only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
    delete:
      tags: [Reviews]
      summary: Delete review (owner only)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted

  /api/v1/auth/google:
    get:
      tags: [Auth]
      summary: Start Google OAuth login
      responses:
        "302":
          description: Redirect to Google OAuth consent

  /api/v1/auth/google/callback:
    get:
      tags: [Auth]
      summary: Google OAuth callback
      responses:
        "200":
          description: OAuth success

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UserRegister"
      responses:
        "201":
          description: Registered

  /api/v1/auth/logIn:
    post:
      tags: [Auth]
      summary: Log in and receive JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string

  /api/v1/auth/logOut:
    post:
      tags: [Auth]
      summary: Log out (invalidate token)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New access token

  /api/v1/auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email with code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "200":
          description: Email verified

  /api/v1/auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend verification email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Verification email sent

  /api/v1/auth/forget-password:
    post:
      tags: [Auth]
      summary: Send reset password code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Reset code sent

  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code, password]
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                password:
                  type: string
                  minLength: 5
                  maxLength: 15
      responses:
        "200":
          description: Password reset

  /api/v1/users:
    get:
      tags: [Users]
      summary: List users
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      tags: [Users]
      summary: Create user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UserRegister"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
    patch:
      tags: [Users]
      summary: Update current user
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated

  /api/v1/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Users]
      summary: Get user by id
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      tags: [Users]
      summary: Update user (requires permission)
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
    delete:
      tags: [Users]
      summary: Delete user (requires permission)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted

  /api/v1/coupons:
    get:
      tags: [Coupons]
      summary: List coupons (protected)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coupon"
    post:
      tags: [Coupons]
      summary: Create coupon (protected)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"

  /api/v1/coupons/validate:
    get:
      tags: [Coupons]
      summary: Validate coupon (protected)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: code
          schema:
            type: string
      responses:
        "200":
          description: OK

  /api/v1/coupons/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Coupons]
      summary: Get coupon
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"
    patch:
      tags: [Coupons]
      summary: Update coupon
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponCreate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"
    delete:
      tags: [Coupons]
      summary: Delete coupon
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted

  /api/v1/wishList:
    get:
      tags: [WishList]
      summary: Get wishlist (protected)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WishList"
    post:
      tags: [WishList]
      summary: Add item to wishlist (protected)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
      responses:
        "200":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WishList"
    delete:
      tags: [WishList]
      summary: Clear wishlist (protected)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Cleared
  /api/v1/wishList/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    delete:
      tags: [WishList]
      summary: Remove wishlist item (protected)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Removed

  /api/v1/address:
    get:
      tags: [Address]
      summary: List authenticated user's addresses (protected)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Address"
    post:
      tags: [Address]
      summary: Add address (protected)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressCreate"
      responses:
        "201":
          description: Created

  /api/v1/address/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Address]
      summary: Get address (protected)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
    patch:
      tags: [Address]
      summary: Update address (protected)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
    delete:
      tags: [Address]
      summary: Delete address (protected)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted

  /api/v1/product2:
    get:
      tags: [Product2]
      summary: List products (flex schema)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product2Base"
    post:
      tags: [Product2]
      summary: Create product (flex schema)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product2Create"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product2Base"

  /api/v1/product2/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Product2]
      summary: Get product (flex schema)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product2Base"
    patch:
      tags: [Product2]
      summary: Update product metadata (not variants/sizes)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product2Update"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product2Base"
    delete:
      tags: [Product2]
      summary: Delete product
      responses:
        "204":
          description: Deleted

  /api/v1/product2/{id}/images:
    post:
      tags: [Product2]
      summary: Add product-level images (simple, sizes_only)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product2Base"

  /api/v1/product2/{id}/sizes:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Product2]
      summary: Add size (sizes_only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product2SizeCreate"
      responses:
        "200":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product2Base"

  /api/v1/product2/{productId}/sizes/{sizeId}:
    parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: string
      - name: sizeId
        in: path
        required: true
        schema:
          type: string
    patch:
      tags: [Product2]
      summary: Update size (sizes_only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product2SizeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product2Base"
    delete:
      tags: [Product2]
      summary: Delete size (sizes_only)
      responses:
        "204":
          description: Deleted

  /api/v1/product2/{id}/variants:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Product2]
      summary: Add variant (variant or variant_with_sizes)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product2VariantCreate"
      responses:
        "200":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product2Base"

  /api/v1/product2/{id}/variants/{variantId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: variantId
        in: path
        required: true
        schema:
          type: string
    patch:
      tags: [Product2]
      summary: Update variant (variant or variant_with_sizes)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product2VariantUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product2Base"
    delete:
      tags: [Product2]
      summary: Delete variant
      responses:
        "204":
          description: Deleted

  /api/v1/product2/{id}/variants/{variantId}/sizes:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: variantId
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Product2]
      summary: Add size to variant (variant_with_sizes)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product2VariantSizeCreate"
      responses:
        "200":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product2Base"

  /api/v1/product2/{id}/variants/{variantId}/sizes/{sizeId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: variantId
        in: path
        required: true
        schema:
          type: string
      - name: sizeId
        in: path
        required: true
        schema:
          type: string
    patch:
      tags: [Product2]
      summary: Update variant size (variant_with_sizes)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product2VariantSizeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product2Base"
    delete:
      tags: [Product2]
      summary: Delete variant size
      responses:
        "204":
          description: Deleted

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
      description: Page number for pagination
    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
      description: Number of items per page
    sort:
      name: sort
      in: query
      schema:
        type: string
      description: Sort expression, e.g. `-createdAt` or `price`
    fields:
      name: fields
      in: query
      schema:
        type: string
      description: Comma-separated fields to include
    search:
      name: q
      in: query
      schema:
        type: string
      description: Full-text search term
    idParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Mongo ObjectId

